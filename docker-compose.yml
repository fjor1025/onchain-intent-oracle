version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: oio-postgres
    environment:
      POSTGRES_USER: oio
      POSTGRES_PASSWORD: oio
      POSTGRES_DB: oio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oio"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional: Redis for caching / rate limiting
  redis:
    image: redis:7-alpine
    container_name: oio-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
